# Set the prefix to ^A (screen style)
unbind C-b
set -g prefix ^A
bind a send-prefix

# Add truecolor support
set-option -ga terminal-overrides ",xterm-256color:Tc"
# Default terminal is 256 colors
set -g default-terminal "tmux-256color"

# Push the current window name up to the physical terminal's tab/window
# title, so it doesn't just show whatever the foreground process (e.g.
# "claude") set on its own.
set -g set-titles on
set -g set-titles-string "#W"

# Default window format, used when theme doesn't get loaded
setw -g window-status-format "#[fg=white]#[bg=blue] #I #[bg=blue]#[fg=white] #W "
setw -g window-status-current-format "#[bg=brightmagenta]#[fg=white] *#I #[fg=white,bold]#[bg=cyan] [#W] "
set -g status-fg white
set -g status-bg blue
set -g status-left ''
set -g status-right '%a %Y-%m-%d %H:%M'

# kill scrollback
bind K clear-history

# split windows like vim
# vim's definition of a horizontal/vertical split is reversed from tmux's
bind s split-window -v
bind v split-window -h

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by, only
# one at a time can be slow
bind < resize-pane -L 1
bind > resize-pane -R 1
bind - resize-pane -D 1
bind + resize-pane -U 1

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# vi-style controls for copy mode
setw -g mode-keys vi

# Even more vim like
unbind [
bind Escape copy-mode
unbind P
bind P paste-buffer
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection

# Plugins: 'ctrl-A I' to install, 'ctrl-A U' to update
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# Fork with a local patch: status-left session segment shows hostname
# instead of the tmux session name (main branch, merged from
# hostname-session-segment).
set -g @plugin 'bmatheny/tmux-powerkit'

# PowerKit status bar: drop datetime/hostname/git from the right side
# (datetime is on the menubar already; git duplicates what Claude Code's
# own pane title/statusline shows; hostname moves to the left instead).
set -g @powerkit_plugins "battery,cpu,memory"
run '~/.tmux/plugins/tpm/tpm'

set-option -g status-position bottom
